[workspace]
name = "vehicle-trajectory-tcn-vae"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.13.*"
pip = ">=25.0"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu124"]

[pypi-dependencies]
torch = "==2.6.0"
torchvision = "==0.21.0"
torchaudio = "==2.6.0"
torch-geometric = "==2.7.0"
numpy = "==2.2.4"
huggingface-hub = "==0.34.4"

[tasks]
verify-cuda = "python scripts/verify_cuda.py"
bootstrap = "python -m pip install --upgrade pip && python -m pip install -r requirements.txt"
download-datasets = "python scripts/download_datasets.py --repo-id aryanb1702/awk9 --out-dir datasets"
train = "python scripts/train.py"
validate = "python scripts/validate.py"
